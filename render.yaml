# render.yaml — тільки для FRONTEND (Static Site — безкоштовно)
# Backend деплоїться на Railway.app (railway.toml)
# БД — на Neon.tech або Railway PostgreSQL

services:
  - type: web
    name: workhive-frontend
    env: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: ./frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false   # вставити URL бекенду з Railway, напр. https://workhive-backend.up.railway.app
